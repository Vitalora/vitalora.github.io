<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vitalora</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{

background:#f6fbf7;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

background:white;

width:90%;

max-width:420px;

padding:35px;

border-radius:25px;

box-shadow:0 10px 35px rgba(0,0,0,.08);

text-align:center;

}

.logo{

font-size:55px;

}

h1{

margin-top:10px;

color:#2E7D32;

font-size:34px;

}

p{

margin-top:15px;

color:#555;

line-height:1.6;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">🌿</div>

<h1>Vitalora</h1>

<p>

Wellness starts with informed choices.

</p>

</div>

</body>

</html>
