<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vitalora</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#dff7df,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

background:white;

width:90%;

max-width:420px;

padding:35px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

text-align:center;

}

.logo{

font-size:65px;

}

h1{

margin:10px 0;

color:#2e7d32;

}

p{

color:#666;

margin-bottom:30px;

}

.button{

display:block;

text-decoration:none;

background:#2e7d32;

color:white;

padding:16px;

margin:15px 0;

border-radius:12px;

font-size:18px;

font-weight:bold;

transition:.3s;

}

.button:hover{

background:#256428;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">🌿V</div>

<h1>VITALORA</h1>

<p>Wellness starts with informed choices</p>

<a class="button" href="#">🇲🇽 Mexico</a>

<a class="button" href="#">🇵🇪 Peru</a>

<a class="button" href="#">🇺🇸 USA / Puerto Rico</a>

</div>

</body>

</html>
